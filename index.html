<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAS Guest Wi‑Fi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
      url('https://images.unsplash.com/photo-1522199755839-a2bacb67c546?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 450px;
      background: rgba(18, 18, 18, 0.88);
      padding: 35px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
      text-align: center;
    }

    .logo {
      width: 90px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #d7d7d7;
      margin-bottom: 25px;
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
      margin-bottom: 25px;
      font-size: 14px;
      color: #cfcfcf;
    }

    .terms a {
      color: #4ea1ff;
      text-decoration: none;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    .connect-btn {
      width: 100%;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #0078ff;
      color: white;
      transition: 0.25s ease;
    }

    .connect-btn:hover {
      background: #005fd1;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #9f9f9f;
    }
  </style>
</head>
<body>
  <div class="container">

    <img
      class="logo"
      src="yasnetworks-logo.png"
      alt="Company Logo"
    />

    <h1>Welcome to YAS Guest Wi‑Fi</h1>

    <p>
      Secure high-speed internet access for guests and visitors.
      Please review and accept the Terms & Conditions before connecting.
    </p>

    <div class="terms">
      <input type="checkbox" id="acceptTerms" />
      <label for="acceptTerms">
        I agree to the
        <a href="#">Terms & Conditions</a>
        and acceptable use policy.
      </label>
    </div>

    <button class="connect-btn" onclick="connectWifi()">
      Connect to Wi‑Fi
    </button>

    <div class="footer">
      © 2026 YAS Networks. All rights reserved.
    </div>
  </div>

  <script>
    function connectWifi() {
      const checkbox = document.getElementById('acceptTerms');

      if (!checkbox.checked) {
        alert('Please accept the Terms & Conditions first.');
        return;
      }

      // Meraki splash redirect support
      const urlParams = new URLSearchParams(window.location.search);
      const baseGrantUrl = urlParams.get('base_grant_url');
      const userContinueUrl = urlParams.get('user_continue_url');

      if (baseGrantUrl) {
        window.location.href = `${baseGrantUrl}?continue_url=${encodeURIComponent(userContinueUrl || 'https://google.com')}`;
      } else {
        alert('Meraki redirect parameters not detected.');
      }
    }
  </script>
</body>
</html>
