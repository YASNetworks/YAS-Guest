<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAS Networks Wi‑Fi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:#000;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}
.bg{
position:fixed;
inset:0;
background:url('background.png') center/cover no-repeat;
filter:brightness(.45);
}
.card{
position:relative;
width:420px;
padding:40px 30px;
border-radius:28px;
background:rgba(0,0,0,.55);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(10px);
z-index:2;
}
.logo{
width:100%;
max-width:320px;
display:block;
margin:0 auto 30px;
}
h1{
font-size:20px;
margin-bottom:12px;
text-align:center;
}
p{
text-align:center;
opacity:.9;
margin-bottom:28px;
}
.checkbox-row{
display:flex;
align-items:center;
gap:12px;
margin-bottom:24px;
justify-content:center;
}
input[type="checkbox"]{
appearance:none;
width:24px;
height:24px;
border:2px solid #fff;
border-radius:6px;
cursor:pointer;
position:relative;
}
input[type="checkbox"]:checked::after{
content:"✓";
position:absolute;
left:4px;
top:-1px;
font-size:18px;
color:#f3c24f;
font-weight:bold;
}
a{color:#f3c24f;text-decoration:none}
button{
width:100%;
padding:18px;
border:none;
border-radius:40px;
font-size:28px;
font-weight:bold;
background:linear-gradient(#f8d46b,#dca328);
cursor:pointer;
color:#000;
}
button:disabled{
opacity:.5;
cursor:not-allowed;
}
.footer{
margin-top:24px;
text-align:center;
font-size:13px;
opacity:.8;
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="card">
<img class="logo" src="logo.png">

<h1>Welcome to YAS Networks Wi‑Fi</h1>
<p>Stay connected. Enjoy seamless and secure internet access.</p>

<div class="checkbox-row">
<input type="checkbox" id="agree">
<label for="agree">I agree to the <a href="terms.html">Terms and Conditions</a></label>
</div>

<button id="connectBtn" disabled>Connect</button>

<div class="footer">Your privacy and security are important to us.</div>
</div>

<script>
const agree=document.getElementById('agree');
const btn=document.getElementById('connectBtn');

agree.addEventListener('change',()=>{
btn.disabled=!agree.checked;
});

btn.addEventListener('click',()=>{
if(agree.checked){
window.location.href='https://www.google.com';
}
});
</script>
</body>
</html>
