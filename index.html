<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAS Networks Wi-Fi</title>

<style>

html,body{
margin:0;
padding:0;
background:#02060c;
}

.page{
position:relative;
width:min(100vw,768px);
margin:auto;
}

.bg{
width:100%;
display:block;
}

/* CHECKBOX */
.checkbox{
position:absolute;
left:28.8%;
top:51%;
width:24px;
height:24px;
z-index:1000;
cursor:pointer;

appearance:none;
-webkit-appearance:none;

border:2px solid #ffffff;
border-radius:4px;
background:transparent;
}

.checkbox:checked::after{
content:'✓';
color:#f3c54b;
font-size:18px;
position:absolute;
left:3px;
top:-2px;
font-weight:bold;
}
/* TERMS LINK */
.terms-link{
position:absolute;
left:47%;
top:51%;
width:28%;
height:4%;
display:block;
z-index:900;
}

/* CONNECT BUTTON */
.connect-link{
position:absolute;
left:27%;
top:56%;
width:46%;
height:7%;
display:block;
z-index:900;
}

</style>
</head>

<body>

<div class="page">

<img src="Page 1.png" class="bg">

<input type="checkbox" class="checkbox" id="agree">

<a href="terms.html" class="terms-link"></a>

<a href="#" class="connect-link" onclick="connectNow(event)"></a>

</div>

<script>

function connectNow(event){

event.preventDefault();

if(!document.getElementById('agree').checked){
alert('Please accept the Terms and Conditions.');
return;
}

window.location.href='https://yasnetworks.com';

}

</script>

</body>
</html>
