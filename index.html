<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YAS Networks Wi-Fi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-page">
  <main class="page-shell home-shell">
    <section class="home-content">
      <div class="brand-row">
        <div class="brand-icon" aria-hidden="true"></div>
        <div class="brand-text">YAS NETWORKS</div>
      </div>

      <div class="welcome-block">
        <h1>Welcome to YAS Networks Wi‑Fi</h1>
        <p>Stay connected. Enjoy seamless and secure internet access.</p>

        <div class="agree-row">
          <input id="agree" class="agree-box" type="checkbox" />
          <label for="agree">
            I agree to the
            <a href="terms.html">Terms and Conditions</a>
          </label>
        </div>

        <button id="connectBtn" class="connect-btn" type="button" disabled>Connect</button>

        <div class="privacy-note">
          <span aria-hidden="true">▣</span>
          Your privacy and security are important to us.
        </div>
      </div>

      <footer class="home-footer">
        <span>◎ www.yasnetworks.com</span>
        <span class="divider"></span>
        <span>✉ info@yasnetworks.com</span>
      </footer>
    </section>
  </main>

  <script>
    const agree = document.getElementById("agree");
    const connectBtn = document.getElementById("connectBtn");

    agree.addEventListener("change", function () {
      connectBtn.disabled = !agree.checked;
    });

    connectBtn.addEventListener("click", function () {
      if (!agree.checked) return;

      const merakiUrl = new URLSearchParams(window.location.search).get("base_grant_url");
      if (merakiUrl) {
        window.location.href = merakiUrl;
      } else {
        window.location.href = "success.html";
      }
    });
  </script>
</body>
</html>
