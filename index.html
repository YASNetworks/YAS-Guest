<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAS Networks Wi-Fi</title>

<style>
html,body{
margin:0;
padding:0;
background:#02060c;
}

.page{
position:relative;
width:min(100vw,768px);
margin:auto;
}

.bg{
width:100%;
display:block;
}

.check-wrap{
position:absolute;
left:24.6%;
top:48.25%;
width:48px;
height:48px;
z-index:1000;
cursor:pointer;
}

.check-wrap input{
display:none;
}

.custom-check{
width:100%;
height:100%;
display:block;
position:relative;
}

.check-wrap input:checked + .custom-check::after{
content:"✓";
position:absolute;
left:12px;
top:0px;
color:#f3c54b;
font-size:30px;
font-weight:bold;
line-height:1;
}

.terms-link{
position:absolute;
left:49%;
top:48.6%;
width:29%;
height:3%;
display:block;
z-index:900;
}

.connect-link{
position:absolute;
left:22.7%;
top:54.5%;
width:55%;
height:5.8%;
display:block;
z-index:900;
}
</style>
</head>

<body>

<div class="page">

<img src="Page 1.png" class="bg" alt="YAS Networks Wi-Fi">

<label class="check-wrap">
  <input type="checkbox" id="agree">
  <span class="custom-check"></span>
</label>

<a href="terms.html" class="terms-link" aria-label="Terms and Conditions"></a>

<a href="#" class="connect-link" onclick="connectNow(event)" aria-label="Connect"></a>

</div>

<script>
function connectNow(event){
event.preventDefault();

if(!document.getElementById('agree').checked){
alert('Please accept the Terms and Conditions.');
return;
}

const params = new URLSearchParams(window.location.search);
const baseGrantUrl = params.get("base_grant_url");
const continueUrl = params.get("user_continue_url") || "https://yasnetworks.com";

if(!baseGrantUrl){
window.location.href = "https://yasnetworks.com";
return;
}

window.location.href = baseGrantUrl + "?continue_url=" + encodeURIComponent(continueUrl);
}
</script>

</body>
</html>
